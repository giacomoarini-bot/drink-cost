    { ingredientId:'ing-13', volumeCl:2.0, calculatedCost:0.07 },
    { ingredientId:'ing-15', volumeCl:3.0, calculatedCost:0.05 },
    { ingredientId:'ing-19', volumeCl:1.0, calculatedCost:0.15 } ], profitMargin:130, vatRate:22, createdAt:now(), updatedAt:now() },

    { ingredientId:'ing-5', volumeCl:5.0, calculatedCost:(5/100)*costFromBottle(19.6,700) },
    { ingredientId:'ing-7', volumeCl:2.5, calculatedCost:(2.5/100)*costFromBottle(9.8,700) },
    { ingredientId:'ing-12', volumeCl:2.0, calculatedCost:0.10 } ], profitMargin:140, vatRate:22, createdAt:now(), updatedAt:now() },

/* ---------- Store with localStorage ---------- */
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { const p = JSON.parse(raw); return { ingredients:p.ingredients||DEFAULT_INGREDIENTS, cocktails:p.cocktails||DEFAULT_COCKTAILS, selectedCocktailId:p.selectedCocktailId||'c-1' }; }
  } catch(e){}
  return { ingredients:DEFAULT_INGREDIENTS, cocktails:DEFAULT_COCKTAILS, selectedCocktailId:'c-1' };
}

function useCocktailStore() {
  const initial = loadState();
  const [ingredients, setIngredients] = useState(initial.ingredients);
  const [cocktails, setCocktails] = useState(initial.cocktails);
  const [settings] = useState(DEFAULT_SETTINGS);
  const [selectedCocktailId, setSelectedCocktailId] = useState(initial.selectedCocktailId);
  const [syncStatus, setSyncStatus] = useState(sb ? 'connecting' : 'local'); // connecting|synced|syncing|offline|local
  const applyingRemote = useRef(false);   // true while applying a remote change (prevents echo push)
  const hydrated = useRef(false);          // becomes true after first remote load
  const pushTimer = useRef(null);

  // Persist to localStorage (instant cache) on every change
  useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ingredients, cocktails, selectedCocktailId })); } catch(e){}
  }, [ingredients, cocktails, selectedCocktailId]);

  // Push to Supabase (debounced), skipping the initial load and remote-applied changes
  useEffect(() => {
    if (!sb) return;
    if (!hydrated.current) return;      // don't push until we've loaded remote once
    if (applyingRemote.current) return; // don't echo a change we just received
    setSyncStatus('syncing');
    if (pushTimer.current) clearTimeout(pushTimer.current);
    pushTimer.current = setTimeout(async () => {
      try {
        const { error } = await sb.from('drink_cost_state').upsert({
          id: WORKSPACE_ID,
          data: { ingredients, cocktails, selectedCocktailId },
          client_id: CLIENT_ID,
          updated_at: new Date().toISOString(),
        });
        setSyncStatus(error ? 'offline' : 'synced');
      } catch(e) { setSyncStatus('offline'); }
    }, 600);
  }, [ingredients, cocktails, selectedCocktailId]);

  // Initial remote load + realtime subscription
  useEffect(() => {
    if (!sb) return;
    let channel;
    (async () => {
      try {
        const { data, error } = await sb.from('drink_cost_state').select('data').eq('id', WORKSPACE_ID).maybeSingle();
        if (!error && data && data.data && data.data.ingredients) {
          applyingRemote.current = true;
          setIngredients(data.data.ingredients);
          setCocktails(data.data.cocktails);
          if (data.data.selectedCocktailId) setSelectedCocktailId(data.data.selectedCocktailId);
          setTimeout(() => { applyingRemote.current = false; }, 0);
          setSyncStatus('synced');
        } else {
          // no remote row yet -> seed it from current local/default state
          await sb.from('drink_cost_state').upsert({
            id: WORKSPACE_ID,
            data: { ingredients, cocktails, selectedCocktailId },
            client_id: CLIENT_ID,
            updated_at: new Date().toISOString(),
          });
          setSyncStatus('synced');
        }
      } catch(e) { setSyncStatus('offline'); }
      hydrated.current = true;

      channel = sb.channel('dcd-realtime')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'drink_cost_state', filter: `id=eq.${WORKSPACE_ID}` },
          (payload) => {
            const row = payload.new;
            if (!row || !row.data) return;
            if (row.client_id === CLIENT_ID) return; // ignore our own writes
            applyingRemote.current = true;
            if (row.data.ingredients) setIngredients(row.data.ingredients);
            if (row.data.cocktails) setCocktails(row.data.cocktails);
            if (row.data.selectedCocktailId) setSelectedCocktailId(row.data.selectedCocktailId);
            setSyncStatus('synced');
            setTimeout(() => { applyingRemote.current = false; }, 0);
          })
        .subscribe();
    })();
    return () => { if (channel) sb.removeChannel(channel); };
  }, []);

  const addIngredient = useCallback((ing) => { const id=`ing-${uid()}`; setIngredients(s=>[...s,{...ing,id,createdAt:now()}]); return id; }, []);
  const updateIngredient = useCallback((id, updates) => {
    setIngredients(prev=>{
      const nextIngs=prev.map(i=>i.id===id?{...i,...updates}:i);
      const merged=nextIngs.find(i=>i.id===id);
      setCocktails(cs=>cs.map(c=>({...c, recipeItems:c.recipeItems.map(r=>
        r.ingredientId===id ? {...r, calculatedCost:itemCost(merged,r)} : r )})));
      return nextIngs;
    });
  }, []);
  const deleteIngredient = useCallback((id) => {
    setIngredients(s=>s.filter(i=>i.id!==id));
    setCocktails(s=>s.map(c=>({...c, recipeItems:c.recipeItems.filter(r=>r.ingredientId!==id)})));
  }, []);
  const addCocktail = useCallback((c) => { const id=`c-${uid()}`; setCocktails(s=>[...s,{...c,id,createdAt:now(),updatedAt:now()}]); setSelectedCocktailId(id); return id; }, []);
  const updateCocktail = useCallback((id, updates) => { setCocktails(s=>s.map(c=>c.id===id?{...c,...updates,updatedAt:now()}:c)); }, []);
  const deleteCocktail = useCallback((id) => { setCocktails(s=>s.filter(c=>c.id!==id)); setSelectedCocktailId(cur=>cur===id?null:cur); }, []);

  const addRecipeItem = useCallback((cocktailId, ingredientId, amount) => {
    setIngredients(ings=>{ const ing=ings.find(i=>i.id===ingredientId);
      if (ing) {
        const piece=isPiece(ing);
        const amt = amount!=null ? amount : defaultAmount(ing);
        setCocktails(cs=>cs.map(c=>{
          if (c.id!==cocktailId) return c;
          const ex=c.recipeItems.find(r=>r.ingredientId===ingredientId);
          if (ex) {
            const nv = piece ? {pieces:(ex.pieces||0)+amt} : {volumeCl:(ex.volumeCl||0)+amt};
            const nextItem={...ex,...nv}; nextItem.calculatedCost=itemCost(ing,nextItem);
            return {...c,updatedAt:now(),recipeItems:c.recipeItems.map(r=>r.ingredientId===ingredientId?nextItem:r)};
          }
          const base = piece ? {ingredientId,pieces:amt} : {ingredientId,volumeCl:amt};
          base.calculatedCost=itemCost(ing,base);
          return {...c,updatedAt:now(),recipeItems:[...c.recipeItems,base]};
        }));
      }
      return ings; });
  }, []);
  const updateRecipeItem = useCallback((cocktailId, ingredientId, amount) => {
    setIngredients(ings=>{ const ing=ings.find(i=>i.id===ingredientId);
      if (ing) { const piece=isPiece(ing);
        setCocktails(cs=>cs.map(c=>c.id===cocktailId?{...c,updatedAt:now(),recipeItems:c.recipeItems.map(r=>{
          if (r.ingredientId!==ingredientId) return r;
          const nv = piece ? {pieces:amount} : {volumeCl:amount};
          const nextItem={...r,...nv}; nextItem.calculatedCost=itemCost(ing,nextItem); return nextItem;
        })}:c));
      }
      return ings; });
  }, []);
  const removeRecipeItem = useCallback((cocktailId, ingredientId) => { setCocktails(cs=>cs.map(c=>c.id===cocktailId?{...c,updatedAt:now(),recipeItems:c.recipeItems.filter(r=>r.ingredientId!==ingredientId)}:c)); }, []);

  const calculateCocktailCost = useCallback((cocktailId) => {
    const c=cocktails.find(x=>x.id===cocktailId); if(!c) return {totalCost:0,totalVolume:0,totalPieces:0,portions:1};
    let tc=0,tv=0,tp=0; c.recipeItems.forEach(it=>{ tc+=it.calculatedCost||0; tv+=it.volumeCl||0; tp+=it.pieces||0; });
    return {totalCost:tc,totalVolume:tv,totalPieces:tp,portions:1};
  }, [cocktails]);
  const calculatePricing = useCallback((cocktailId) => {
    const c=cocktails.find(x=>x.id===cocktailId); if(!c) return {costPerPortion:0,targetPrice:0,finalPrice:0,marginWarning:false};
    const {totalCost}=calculateCocktailCost(cocktailId); const cpp=totalCost;
    const tp=cpp*(1+c.profitMargin/100); const fp=tp*(1+c.vatRate/100);
    return {costPerPortion:cpp,targetPrice:tp,finalPrice:fp,marginWarning:c.profitMargin<100};
  }, [cocktails, calculateCocktailCost]);

  const resetAll = useCallback(() => {
    if (confirm('Ripristinare tutti i dati di default? Perderai le tue modifiche su tutti i dispositivi.')) {
      localStorage.removeItem(STORAGE_KEY);
      setIngredients(DEFAULT_INGREDIENTS); setCocktails(DEFAULT_COCKTAILS); setSelectedCocktailId('c-1');
    }
  }, []);

  return { ingredients, cocktails, settings, selectedCocktailId, syncStatus, setSelectedCocktailId, addIngredient, updateIngredient, deleteIngredient, addCocktail, updateCocktail, deleteCocktail, addRecipeItem, updateRecipeItem, removeRecipeItem, calculateCocktailCost, calculatePricing, resetAll };
}

/* ---------- Liquid background ---------- */
function LiquidBackground() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas=ref.current; if(!canvas) return; const ctx=canvas.getContext('2d'); if(!ctx) return;
    let raf,t=0;
    const resize=()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;}; resize();
    window.addEventListener('resize',resize);
    const blobs=[{phase:0,speed:0.002,radius:0.6},{phase:2.1,speed:0.0015,radius:0.5},{phase:4.2,speed:0.001,radius:0.7}];
    const animate=()=>{ t+=1; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.globalCompositeOperation='screen';
      blobs.forEach(b=>{ const x=canvas.width*(0.5+0.3*Math.sin(t*b.speed+b.phase)); const y=canvas.height*(0.5+0.2*Math.sin(t*b.speed*1.3+b.phase));
        const r=Math.min(canvas.width,canvas.height)*b.radius; const g=ctx.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0,'rgba(227,27,35,0.04)'); g.addColorStop(0.5,'rgba(227,27,35,0.02)'); g.addColorStop(1,'rgba(227,27,35,0)');
        ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height); });
      raf=requestAnimationFrame(animate); };
    animate();
    return ()=>{ window.removeEventListener('resize',resize); cancelAnimationFrame(raf); };
  }, []);
  return <canvas ref={ref} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:0,pointerEvents:'none'}} />;
}

function GlassVisualizer({ store, recipeItems, totalVolume }) {

  const maxVolume=Math.max(totalVolume,15); const fillPct=Math.min((totalVolume/maxVolume)*100,100); const y=120-(fillPct/100)*90-10;
  return (
    <div className="relative w-28 h-36 lg:w-32 lg:h-40">
      <svg viewBox="0 0 100 120" className="w-full h-full" style={{filter:'drop-shadow(0 0 8px rgba(227,27,35,0.15))'}}>
        <defs>
          <clipPath id="glass-clip"><path d="M10 30 Q10 80 25 90 L25 100 L15 105 L15 110 L85 110 L85 105 L75 100 L75 90 Q90 80 90 30 Z" /></clipPath>
          <linearGradient id="liquid-gradient" x1="0" y1="1" x2="0" y2="0">
            {recipeItems.map((item,i)=>{ const ing=ingredients.find(g=>g.id===item.ingredientId); if(!ing||totalVolume===0||isPiece(ing)) return null;
              const offset=recipeItems.slice(0,i).reduce((s,r)=>s+(r.volumeCl||0),0)/totalVolume;
              return <stop key={item.ingredientId} offset={`${offset*fillPct}%`} stopColor={INGREDIENT_TYPE_COLORS[ing.type]} />; })}
            <stop offset="100%" stopColor="#E31B23" />
          </linearGradient>
        </defs>
        <g clipPath="url(#glass-clip)">
          <rect x="0" y={`${y}`} width="100" height="100" fill="url(#liquid-gradient)" opacity="0.7">
            <animate attributeName="y" from="120" to={`${y}`} dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" />
          </rect>
          <line x1="10" y1={`${y}`} x2="90" y2={`${y}`} stroke="rgba(244,244,240,0.3)" strokeWidth="0.5" />
        </g>
        <path d="M10 30 Q10 80 25 90 L25 100 L15 105 L15 110 L85 110 L85 105 L75 100 L75 90 Q90 80 90 30 Z" fill="none" stroke="rgba(244,244,240,0.15)" strokeWidth="1.5" />
        <line x1="20" y1="50" x2="30" y2="50" stroke="rgba(244,244,240,0.1)" strokeWidth="0.5" />
        <line x1="20" y1="65" x2="30" y2="65" stroke="rgba(244,244,240,0.1)" strokeWidth="0.5" />
        <line x1="20" y1="80" x2="30" y2="80" stroke="rgba(244,244,240,0.1)" strokeWidth="0.5" />
      </svg>
      <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 text-center"><span className="text-xs text-[#A8A29E] font-mono">{totalVolume.toFixed(1)} cl</span></div>
    </div>
  );
}

function Stat({ color, label }) {
  return <div className="flex items-center gap-2 text-xs text-[#A8A29E]"><div className="w-2 h-2 rounded-full" style={{backgroundColor:color}} /><span>{label}</span></div>;
}

function CocktailBuilder({ store, onNewCocktail, onEditCocktail }) {

  const selected=cocktails.find(c=>c.id===selectedCocktailId);
  const costData=selectedCocktailId?calculateCocktailCost(selectedCocktailId):{totalCost:0,totalVolume:0};
  const step=(id,delta)=>{ const item=selected.recipeItems.find(r=>r.ingredientId===id); if(!item)return; const ing=ingredients.find(i=>i.id===id);
    if (isPiece(ing)) { updateRecipeItem(selected.id,id,Math.max(1,Math.round((item.pieces||0)+delta))); }
    else { updateRecipeItem(selected.id,id,Math.max(0.5,+((item.volumeCl||0)+delta).toFixed(1))); } };

    <div className="glass-surface rounded-3xl h-full flex items-center justify-center">

          const piece=isPiece(ing);
          const isExp=expandedItem===item.ingredientId; const pct=(!piece&&costData.totalVolume>0)?((item.volumeCl||0)/costData.totalVolume)*100:0;
          return (

/* ---------- Custom SVG Donut ---------- */
function Donut({ data, size=160, thickness=26 }) {
  const total=data.reduce((s,d)=>s+d.value,0);
  const r=(size-thickness)/2; const cx=size/2, cy=size/2; const C=2*Math.PI*r;
  let acc=0;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="rgba(244,244,240,0.06)" strokeWidth={thickness} />
      {total>0 && data.map((d,i)=>{ const frac=d.value/total; const dash=frac*C; const off=acc*C; acc+=frac;
        return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={thickness}
          strokeDasharray={`${dash} ${C-dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`} strokeLinecap="butt" />; })}
    </svg>
  );
}

const inputCls="w-full bg-white/[0.05] border border-white/[0.08] rounded-2xl px-4 py-3 text-[15px] text-[#F4F4F0] placeholder-[#A8A29E]/50 focus:outline-none focus:border-[#E31B23] transition-all";

function IngredientSheet({ open, onClose, onSave, editing }) {
  const [name,setName]=useState(''); const [type,setType]=useState('spirit');
  const [unit,setUnit]=useState('volume'); // volume | piece
  const [priceMode,setPriceMode]=useState('bottle'); // bottle | liter (volume)
  const [bottleSizeMl,setBottleSizeMl]=useState(700); const [customBottle,setCustomBottle]=useState(''); const [bottlePrice,setBottlePrice]=useState(''); const [costPerLiter,setCostPerLiter]=useState('');
  const [pieceMode,setPieceMode]=useState('each'); // each | pack (piece)
  const [costPerPiece,setCostPerPiece]=useState(''); const [packPrice,setPackPrice]=useState(''); const [piecesPerPack,setPiecesPerPack]=useState('');
  useEffect(()=>{ if(!open)return;
    if(editing){ setName(editing.name); setType(editing.type); setUnit(editing.unit||'volume');
      setPriceMode(editing.priceMode||'liter'); setBottleSizeMl(editing.bottleSizeMl||700);
      setCustomBottle(BOTTLE_PRESETS.includes(editing.bottleSizeMl)?'':String(editing.bottleSizeMl||'')); setBottlePrice(editing.bottlePrice!=null?String(editing.bottlePrice):''); setCostPerLiter(editing.costPerLiter!=null?String(editing.costPerLiter):'');
      setPieceMode(editing.pieceMode||'each'); setCostPerPiece(editing.costPerPiece!=null?String(editing.costPerPiece):''); setPackPrice(editing.packPrice!=null?String(editing.packPrice):''); setPiecesPerPack(editing.piecesPerPack!=null?String(editing.piecesPerPack):''); }
    else { setName(''); setType('spirit'); setUnit('volume'); setPriceMode('bottle'); setBottleSizeMl(700); setCustomBottle(''); setBottlePrice(''); setCostPerLiter('');
      setPieceMode('each'); setCostPerPiece(''); setPackPrice(''); setPiecesPerPack(''); }
  }, [open, editing]);
  const effSize=customBottle?parseFloat(customBottle):bottleSizeMl;
  const derivedL=priceMode==='bottle'?costFromBottle(parseFloat(bottlePrice)||0,effSize||0):parseFloat(costPerLiter)||0;
  const derivedPiece=pieceMode==='pack'?((parseFloat(piecesPerPack)||0)>0?(parseFloat(packPrice)||0)/(parseFloat(piecesPerPack)||1):0):(parseFloat(costPerPiece)||0);
  const submit=()=>{ if(!name.trim())return;
    if(unit==='volume'){ if(priceMode==='bottle'&&(!bottlePrice||!effSize))return; if(priceMode==='liter'&&!costPerLiter)return;
      onSave({ name:name.trim(), type, unit:'volume', priceMode, bottleSizeMl:priceMode==='bottle'?effSize:null, bottlePrice:priceMode==='bottle'?parseFloat(bottlePrice):null, costPerLiter:derivedL, stock:editing?.stock }, editing?.id);
    } else { if(pieceMode==='each'&&!costPerPiece)return; if(pieceMode==='pack'&&(!packPrice||!piecesPerPack))return;
      onSave({ name:name.trim(), type, unit:'piece', pieceMode, packPrice:pieceMode==='pack'?parseFloat(packPrice):null, piecesPerPack:pieceMode==='pack'?parseFloat(piecesPerPack):null, costPerPiece:derivedPiece, stock:editing?.stock }, editing?.id);
    }
    onClose(); };
  return (
    <Sheet open={open} onClose={onClose} title={editing?'Modifica Ingrediente':'Nuovo Ingrediente'} icon={<FlaskConical className="w-5 h-5 text-[#E31B23]" />}
      footer={<button onClick={submit} className="w-full py-3.5 rounded-2xl text-[15px] font-semibold bg-[#E31B23] text-white hover:bg-[#c41820] active:scale-[0.98] transition-all flex items-center justify-center gap-2" style={{minHeight:50}}><Check className="w-4 h-4" />{editing?'Salva Modifiche':'Aggiungi Ingrediente'}</button>}>
      <div className="p-5 space-y-4">
        <Field label="Nome"><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Es. Gin Tanqueray / Cannuccia" className={inputCls} /></Field>
        <Field label="Categoria">
          <div className="grid grid-cols-3 gap-1.5">{INGREDIENT_TYPES.map(t=><button key={t} type="button" onClick={()=>setType(t)} className="px-2 py-2.5 rounded-xl text-xs font-medium transition-all" style={{background:type===t?'#E31B23':'rgba(244,244,240,0.05)',color:type===t?'#fff':'#A8A29E',minHeight:40}}>{INGREDIENT_TYPE_LABELS[t]}</button>)}</div>
        </Field>
        <Field label="Unità di misura"><Segmented value={unit} onChange={setUnit} options={[{value:'volume',label:'Volume (cl/ml)'},{value:'piece',label:'Pezzo'}]} /></Field>

        {unit==='volume' ? (
          <>
            <Field label="Come vuoi indicare il prezzo?"><Segmented value={priceMode} onChange={setPriceMode} options={[{value:'bottle',label:'A bottiglia'},{value:'liter',label:'Al litro'}]} /></Field>
            {priceMode==='bottle' ? (
              <>
                <Field label="Formato bottiglia (ml)">
                  <div className="flex flex-wrap gap-1.5 mb-2">{BOTTLE_PRESETS.map(v=><button key={v} type="button" onClick={()=>{setBottleSizeMl(v);setCustomBottle('');}} className="px-3 py-1.5 rounded-full text-xs font-medium transition-all" style={{background:!customBottle&&bottleSizeMl===v?'#E31B23':'rgba(244,244,240,0.05)',color:!customBottle&&bottleSizeMl===v?'#fff':'#A8A29E'}}>{v} ml</button>)}</div>
                  <input type="number" min="1" placeholder="Formato personalizzato (ml)" value={customBottle} onChange={e=>setCustomBottle(e.target.value)} className={`${inputCls} tabular-nums`} />
                </Field>
                <Field label="Prezzo della bottiglia (€)"><input type="number" min="0" step="0.01" value={bottlePrice} onChange={e=>setBottlePrice(e.target.value)} placeholder="12.90" className={`${inputCls} tabular-nums`} /></Field>
                <div className="px-4 py-3 rounded-2xl bg-[#34D399]/[0.08] border border-[#34D399]/20 flex items-center justify-between"><span className="text-xs text-[#A8A29E]">Costo al litro calcolato</span><span className="text-sm font-semibold text-[#34D399] tabular-nums">€{derivedL.toFixed(2)}/L</span></div>
              </>
            ) : (
              <Field label="Costo per Litro (€)"><input type="number" min="0" step="0.01" value={costPerLiter} onChange={e=>setCostPerLiter(e.target.value)} placeholder="18.50" className={`${inputCls} tabular-nums`} /></Field>
            )}
          </>
        ) : (
          <>
            <Field label="Come vuoi indicare il prezzo?"><Segmented value={pieceMode} onChange={setPieceMode} options={[{value:'each',label:'Al pezzo'},{value:'pack',label:'A confezione'}]} /></Field>
            {pieceMode==='each' ? (
              <Field label="Costo al pezzo (€)"><input type="number" min="0" step="0.001" value={costPerPiece} onChange={e=>setCostPerPiece(e.target.value)} placeholder="0.08" className={`${inputCls} tabular-nums`} /></Field>
            ) : (
              <>
                <Field label="Prezzo della confezione (€)"><input type="number" min="0" step="0.01" value={packPrice} onChange={e=>setPackPrice(e.target.value)} placeholder="3.50" className={`${inputCls} tabular-nums`} /></Field>
                <Field label="Pezzi per confezione"><input type="number" min="1" step="1" value={piecesPerPack} onChange={e=>setPiecesPerPack(e.target.value)} placeholder="250" className={`${inputCls} tabular-nums`} /></Field>
                <div className="px-4 py-3 rounded-2xl bg-[#34D399]/[0.08] border border-[#34D399]/20 flex items-center justify-between"><span className="text-xs text-[#A8A29E]">Costo al pezzo calcolato</span><span className="text-sm font-semibold text-[#34D399] tabular-nums">€{derivedPiece.toFixed(3)}/pz</span></div>
              </>
            )}
          </>
        )}
      </div>
    </Sheet>
  );
}

function CocktailEditorSheet({ open, onClose, store, editingCocktailId }) {
  const { ingredients, cocktails, addIngredient, addCocktail, updateCocktail, settings } = store;
  const editingCocktail=editingCocktailId?cocktails.find(c=>c.id===editingCocktailId):null;
  const [name,setName]=useState(''); const [description,setDescription]=useState('');
  const [profitMargin,setProfitMargin]=useState(settings.defaultProfitMargin); const [vatRate,setVatRate]=useState(settings.defaultVatRate);
  const [showAdvanced,setShowAdvanced]=useState(false); const [draftItems,setDraftItems]=useState([]); const [search,setSearch]=useState(''); const [showNewIngredient,setShowNewIngredient]=useState(false);
  useEffect(()=>{ if(!open)return;
    if(editingCocktail){ setName(editingCocktail.name); setDescription(editingCocktail.description||''); setProfitMargin(editingCocktail.profitMargin); setVatRate(editingCocktail.vatRate); setDraftItems(editingCocktail.recipeItems.map(r=>({ingredientId:r.ingredientId,volumeCl:r.volumeCl,pieces:r.pieces}))); }
    else { setName(''); setDescription(''); setProfitMargin(settings.defaultProfitMargin); setVatRate(settings.defaultVatRate); setDraftItems([]); }
    setSearch(''); setShowAdvanced(false); setShowNewIngredient(false);
  }, [open, editingCocktailId]);
  const filteredIngredients=ingredients.filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));
  const addDraftItem=(id)=>{ const ing=ingredients.find(i=>i.id===id); const piece=isPiece(ing);
    setDraftItems(items=>{ const ex=items.find(it=>it.ingredientId===id);
      if(ex) return items.map(it=>it.ingredientId===id?(piece?{...it,pieces:(it.pieces||0)+1}:{...it,volumeCl:+((it.volumeCl||0)+1).toFixed(1)}):it);
      return [...items, piece?{ingredientId:id,pieces:1}:{ingredientId:id,volumeCl:4.5}]; }); };
  const stepDraft=(id,delta)=>{ const ing=ingredients.find(i=>i.id===id); const piece=isPiece(ing);
    setDraftItems(items=>items.map(it=>it.ingredientId===id?(piece?{...it,pieces:Math.max(1,Math.round((it.pieces||0)+delta))}:{...it,volumeCl:Math.max(0.5,+((it.volumeCl||0)+delta).toFixed(1))}):it)); };
  const removeDraft=(id)=>setDraftItems(items=>items.filter(it=>it.ingredientId!==id));
  const handleNewIngredientSave=(payload)=>{ const newId=addIngredient(payload); addDraftItem(newId); };
  const submit=()=>{ if(!name.trim())return; const recipeItems=draftItems.map(it=>{ const ing=ingredients.find(i=>i.id===it.ingredientId);
      const base=isPiece(ing)?{ingredientId:it.ingredientId,pieces:it.pieces||0}:{ingredientId:it.ingredientId,volumeCl:it.volumeCl||0};
      base.calculatedCost=itemCost(ing,base); return base; });
    if(editingCocktail) updateCocktail(editingCocktail.id,{name:name.trim(),description:description.trim(),profitMargin,vatRate,recipeItems});
    else addCocktail({name:name.trim(),description:description.trim(),profitMargin,vatRate,recipeItems}); onClose(); };
  const totalCost=draftItems.reduce((sum,it)=>{ const ing=ingredients.find(i=>i.id===it.ingredientId); return sum+itemCost(ing,it); },0);
  return (
    <Sheet open={open} onClose={onClose} wide title={editingCocktail?'Modifica Drink':'Nuovo Drink'} icon={editingCocktail?<Pencil className="w-5 h-5 text-[#E31B23]" />:<Wine className="w-5 h-5 text-[#E31B23]" />}
      footer={<button onClick={submit} disabled={!name.trim()} className="w-full py-3.5 rounded-2xl text-[15px] font-semibold bg-[#E31B23] text-white hover:bg-[#c41820] active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-40 disabled:active:scale-100" style={{minHeight:50}}><Check className="w-4 h-4" />{editingCocktail?'Salva Modifiche':`Crea Drink${totalCost>0?` · €${totalCost.toFixed(2)} costo`:''}`}</button>}>
      <div className="p-5 space-y-4">
        <Field label="Nome del Drink"><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Es. Negroni Sbagliato" className={inputCls} autoFocus /></Field>
        <Field label={<>Descrizione <span className="text-[#A8A29E]/50">- opzionale</span></>}><textarea rows={2} value={description} onChange={e=>setDescription(e.target.value)} placeholder="Breve descrizione..." className={`${inputCls} resize-none`} /></Field>
        <button onClick={()=>setShowAdvanced(v=>!v)} className="flex items-center gap-1.5 text-sm text-[#A8A29E] hover:text-[#F4F4F0] transition-colors"><SlidersHorizontal className="w-3.5 h-3.5" />Margine e IVA {showAdvanced?<ChevronUp className="w-3.5 h-3.5" />:<ChevronDown className="w-3.5 h-3.5" />}</button>
        {showAdvanced && (
          <div className="space-y-3 p-4 rounded-2xl bg-white/[0.03] border border-white/[0.06]">
            <div className="flex items-center justify-between"><span className="text-xs text-[#A8A29E]">Margine di guadagno</span><span className="text-sm font-semibold text-[#34D399] tabular-nums">{profitMargin}%</span></div>
            <input type="range" min="0" max="500" step="5" value={profitMargin} onChange={e=>setProfitMargin(parseInt(e.target.value))} className="w-full" />
            <div className="flex items-center justify-between pt-1"><span className="text-xs text-[#A8A29E]">Aliquota IVA</span><span className="text-sm font-semibold text-[#8B5CF6] tabular-nums">{vatRate}%</span></div>
            <input type="range" min="0" max="50" step="1" value={vatRate} onChange={e=>setVatRate(parseInt(e.target.value))} className="w-full" />
          </div>
        )}
        <div className="pt-1">
          <p className="text-sm font-medium text-[#F4F4F0] mb-2 flex items-center gap-2"><ListPlus className="w-4 h-4 text-[#E31B23]" />Ingredienti</p>
          {draftItems.length>0 && (
            <div className="space-y-1.5 mb-3">
              {draftItems.map(it=>{ const ing=ingredients.find(i=>i.id===it.ingredientId); if(!ing)return null; const cost=itemCost(ing,it); const piece=isPiece(ing);
                return (
                  <div key={it.ingredientId} className="flex items-center gap-2 p-2.5 rounded-2xl bg-white/[0.04] border border-white/[0.06]">
                    <div className="w-2.5 h-2.5 rounded-full shrink-0" style={{backgroundColor:INGREDIENT_TYPE_COLORS[ing.type]}} />
                    <span className="text-sm text-[#F4F4F0] flex-1 min-w-0 truncate">{ing.name}</span>
                    <button onClick={()=>stepDraft(it.ingredientId,-stepSize(ing))} className="w-8 h-8 rounded-full bg-white/[0.08] text-[#F4F4F0] flex items-center justify-center active:scale-90 transition-transform shrink-0"><Minus className="w-3.5 h-3.5" /></button>
                    <span className="text-xs text-[#F4F4F0] tabular-nums w-12 text-center shrink-0">{piece?`${it.pieces||0}pz`:`${(it.volumeCl||0).toFixed(1)}cl`}</span>
                    <button onClick={()=>stepDraft(it.ingredientId,stepSize(ing))} className="w-8 h-8 rounded-full bg-white/[0.08] text-[#F4F4F0] flex items-center justify-center active:scale-90 transition-transform shrink-0"><Plus className="w-3.5 h-3.5" /></button>
                    <span className="text-xs text-[#34D399] tabular-nums w-14 text-right shrink-0">€{cost.toFixed(2)}</span>
                    <button onClick={()=>removeDraft(it.ingredientId)} className="w-8 h-8 rounded-full text-[#A8A29E] hover:text-[#E31B23] flex items-center justify-center transition-all shrink-0"><X className="w-3.5 h-3.5" /></button>
                  </div>
                ); })}
            </div>
          )}
          <div className="relative mb-2">
            <Search className="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-[#A8A29E]" />
            <input type="text" placeholder="Cerca tra i tuoi ingredienti..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full bg-white/[0.05] border border-white/[0.08] rounded-2xl pl-10 pr-4 py-3 text-sm text-[#F4F4F0] placeholder-[#A8A29E] focus:outline-none focus:border-[#E31B23] transition-all" />
          </div>
          <div className="max-h-52 overflow-y-auto space-y-1 rounded-2xl bg-white/[0.02] p-1.5 border border-white/[0.05]">
            {filteredIngredients.map(ing=>{ const inDraft=draftItems.some(it=>it.ingredientId===ing.id);
              return <IngredientRow key={ing.id} ing={ing} onTap={()=>addDraftItem(ing.id)} trailing={<div className="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style={{background:inDraft?'#34D399':'rgba(227,27,35,0.15)',color:inDraft?'#0D0D0D':'#E31B23'}}>{inDraft?<Check className="w-4 h-4" />:<Plus className="w-4 h-4" />}</div>} />; })}
            {filteredIngredients.length===0 && <p className="text-center text-xs text-[#A8A29E] py-4">Nessun ingrediente trovato</p>}
          </div>
          <button onClick={()=>setShowNewIngredient(true)} className="w-full mt-2 py-3 rounded-2xl text-sm font-medium border border-dashed border-white/15 text-[#A8A29E] hover:text-[#F4F4F0] hover:border-[#E31B23]/40 transition-all flex items-center justify-center gap-2" style={{minHeight:46}}><Plus className="w-4 h-4" />Registra un nuovo ingrediente</button>
        </div>
      </div>
      <IngredientSheet open={showNewIngredient} onClose={()=>setShowNewIngredient(false)} onSave={handleNewIngredientSave} editing={null} />
    </Sheet>
  );
}

function App() {
  const store=useCocktailStore();
  const { cocktails, selectedCocktailId, setSelectedCocktailId, addIngredient, updateIngredient, resetAll, syncStatus } = store;
  const [activeTab,setActiveTab]=useState('builder');
  const [ingredientSheetOpen,setIngredientSheetOpen]=useState(false); const [editingIngredient,setEditingIngredient]=useState(null);
  const [cocktailSheetOpen,setCocktailSheetOpen]=useState(false); const [editingCocktailId,setEditingCocktailId]=useState(null);
  useEffect(()=>{ if(!selectedCocktailId&&cocktails.length>0) setSelectedCocktailId(cocktails[0].id); }, [selectedCocktailId, cocktails, setSelectedCocktailId]);
  const openNewCocktail=()=>{ setEditingCocktailId(null); setCocktailSheetOpen(true); };
  const openEditCocktail=(id)=>{ setEditingCocktailId(id); setCocktailSheetOpen(true); };
  const openNewIngredient=()=>{ setEditingIngredient(null); setIngredientSheetOpen(true); };
  const openEditIngredient=(ing)=>{ setEditingIngredient(ing); setIngredientSheetOpen(true); };
  const handleIngredientSave=(payload,id)=>{ if(id) updateIngredient(id,payload); else addIngredient(payload); };
  const quickAdd=()=>{ if(activeTab==='inventory') openNewIngredient(); else openNewCocktail(); };
  return (
    <div className="bg-[#0D0D0D] text-[#F4F4F0] relative overflow-x-hidden" style={{minHeight:'100dvh'}}>
      <LiquidBackground />
      <div className="fixed inset-0 pointer-events-none z-[1]" style={{backgroundImage:'repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.003) 2px, rgba(255,255,255,0.003) 4px)'}} />
      <TopNavigation onNewDrink={openNewCocktail} syncStatus={syncStatus} />
      <div className="relative z-10 px-3 lg:px-6" style={{minHeight:'100dvh', paddingTop:'var(--content-top)', paddingBottom:'var(--content-bottom)'}}>
        <div className="hidden lg:grid grid-cols-12 gap-5" style={{height:'var(--mobile-avail)'}}>
          <div className="col-span-3 flex flex-col gap-4 h-full">
            <div className="flex-1 min-h-0"><IngredientPanel store={store} onAddIngredient={openNewIngredient} onEditIngredient={openEditIngredient} /></div>
            <div className="shrink-0"><CocktailList store={store} onNewCocktail={openNewCocktail} /></div>
          </div>
          <div className="col-span-5 h-full"><CocktailBuilder store={store} onNewCocktail={openNewCocktail} onEditCocktail={openEditCocktail} /></div>
          <div className="col-span-4 h-full"><CostAnalysis store={store} /></div>
        </div>
        <div className="lg:hidden" style={{minHeight:'var(--mobile-avail)'}}>
          {activeTab==='inventory' && (
            <div className="flex flex-col gap-4" style={{minHeight:'var(--mobile-avail)'}}>
              <div style={{height:'calc(var(--mobile-avail) - 160px)',minHeight:240}}><IngredientPanel store={store} onAddIngredient={openNewIngredient} onEditIngredient={openEditIngredient} /></div>
              <CocktailList store={store} onNewCocktail={openNewCocktail} />
            </div>
          )}
          {activeTab==='builder' && <div style={{minHeight:'var(--mobile-avail)'}}><CocktailBuilder store={store} onNewCocktail={openNewCocktail} onEditCocktail={openEditCocktail} /></div>}
          {activeTab==='analysis' && <div style={{minHeight:'var(--mobile-avail)'}}><CostAnalysis store={store} /></div>}
        </div>
      </div>
      <BottomTabBar active={activeTab} onChange={setActiveTab} onQuickAdd={quickAdd} />
      <IngredientSheet open={ingredientSheetOpen} onClose={()=>setIngredientSheetOpen(false)} onSave={handleIngredientSave} editing={editingIngredient} />
      <CocktailEditorSheet open={cocktailSheetOpen} onClose={()=>setCocktailSheetOpen(false)} store={store} editingCocktailId={editingCocktailId} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
